<div class="min-h-screen bg-gradient-to-br from-red-50 to-red-100 flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <!-- Header -->
    <div class="text-center mb-8">

      <a class=" flex items-center justify-center mb-4">
        <img src="./assets/Logo.png" class="h-12 cursor-pointer" alt="Mis Pueblitos Logo" />

      </a>
      <p class="text-gray-600">Comienza tu próxima aventura hoy</p>
    </div>
    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
            Correo Electrónico
          </label>
          <input type="email" id="email" formControlName="email"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition"
            placeholder="tu@email.com" />
          <p *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
            class="mt-1 text-sm text-red-500">
            {{ getEmailError() }}
          </p>
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
            Contraseña
          </label>
          <div class="relative">
            <input [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition"
              placeholder="••••••••" />
            <button type="button" (click)="togglePasswordVisibility()"
              class="absolute right-3 top-3 text-gray-500 hover:text-gray-700">
              <svg *ngIf="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
              <svg *ngIf="showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-4.803m5.596-3.856a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9.172 16.172a4 4 0 015.656 0M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z" />
              </svg>
            </button>
          </div>
          <p *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            class="mt-1 text-sm text-red-500">
            {{ getPasswordError() }}
          </p>
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
          {{ errorMessage }}
        </div>

        <!-- Submit Button -->
        <button type="submit" [disabled]="loginForm.invalid || isLoading"
          class="w-full bg-gradient-to-r from-primary to-red-800 text-white font-semibold py-3 rounded-lg hover:from-primary hover:to-red-800 transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center">
          <span *ngIf="!isLoading">Iniciar Sesión</span>
          <span *ngIf="isLoading" class="flex items-center">
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
              viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
              </path>
            </svg>
            Ingresando...
          </span>
        </button>

        <!-- Divider -->
       <!--  <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white text-gray-500">O continúa con</span>
          </div>
        </div> -->

        <!-- Sign Up Link -->
        <p class="text-center text-gray-600 text-sm">
          ¿No tienes cuenta?
          <a (click)="goToRegister()" class="text-teal-600 font-semibold hover:text-teal-700 transition">
            Regístrate aquí
          </a>
        </p>
      </form>
    </div>

    <!-- Footer -->
    <div class="text-center mt-8">
      <p class="text-gray-500 text-xs">
        <a href="#" class="hover:text-gray-700">Términos</a> •
        <a href="#" class="hover:text-gray-700">Privacidad</a> •
        <a href="#" class="hover:text-gray-700">Contacto</a>
